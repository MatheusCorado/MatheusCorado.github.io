<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de Chá de Panela</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #ffeef2;
      padding: 20px;
      text-align: center;
    }

    h1 {
      color: #d14f79;
    }

    input,
    button {
      padding: 10px;
      margin: 10px 5px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    .present-list {
      list-style: none;
      padding: 0;
      max-width: 500px;
      margin: 20px auto;
    }

    .present-item {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 12px;
      background: white;
      margin-bottom: 8px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    .present-item:hover {
      background: #fce4ec;
    }

    .present-item.selected {
      background: #d14f79;
      color: white;
    }

    .present-item.taken {
      text-decoration: line-through;
      background: #ccc;
      color: #888;
      cursor: not-allowed;
    }
  </style>
</head>

<body>
  <h1>Lista de Chá de Panela</h1>

  <input type="text" id="guestName" placeholder="Digite seu nome">
  <br>
  <button onclick="confirmSelection()">Confirmar Presentes</button>
  <button onclick="exportarLista()">Exportar Lista</button>
  <button onclick="resetarLista()" style="background: red; color: white;">Resetar Lista (Admin)</button>

  <ul class="present-list" id="presentList"></ul>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getFirestore, collection, doc, getDoc, setDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyArPOq9puGaoJG2ikMtoK7tdqKs-_oSEhA",
      authDomain: "cha-de-panela-3f175.firebaseapp.com",
      projectId: "cha-de-panela-3f175",
      storageBucket: "cha-de-panela-3f175.firebasestorage.app",
      messagingSenderId: "54919113387",
      appId: "1:54919113387:web:f203e9dd320a73a0a665ee",
      measurementId: "G-YK68T4LH19"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const presents = [
      'LIQUIDIFICADOR', 'SANDUICHEIRA', 'BATEDEIRA', 'CHALEIRA ELETRICA', 'PANELA DE PRESSÃO',
      'AIRFRYER', 'PANELA ELETRICA DE ARROZ', 'JOGO DE PANELA', 'JOGO DE PANO DE PRATO 2X',
      'JOGO DE COPO', 'JOGO DE COPO', 'JOGO DE TALHER', 'JOGO DE PRATO', 'JOGO DE VASILHAS',
      'JOGO DE VASILHAS', 'JARRA DE VIDRO', 'GARROTA TERMICA DE CAFÉ', 'ESCORREDOR DE LOUÇA',
      'JOGO DE XICARA', 'JOGO DE TRAVESSA', 'FORMA DE BOLO', 'PROCESSADOR DE ALIMENTO', 'RALADOR',
      'TABUA DE MADEIRA', 'JOGO DE TAÇA', 'JOGO DE TOALHA', 'JOGO DE TOALHA', 'POTE HERMETICOS',
      'POTE HERMETICOS', 'JOGO DE CAMA (QUEEN)', 'JOGO DE CAMA (QUEEN)', 'TABUA DE PASSA ROUPA',
      'VARAL DE CHÃO', 'CUSCUZEIRA'
    ];

    const presentList = document.getElementById("presentList");

    // Atualiza a lista de presentes na UI
    function loadPresents(taken) {
      presentList.innerHTML = "";
      presents.forEach((present, index) => {
        const li = document.createElement("li");
        li.classList.add("present-item");

        const span = document.createElement("span");
        span.textContent = present;

        if (taken[present]) {
          li.classList.add("taken");
          li.title = `Escolhido por: ${taken[present]}`;
        } else {
          li.addEventListener("click", () => toggleSelect(li, present));
        }

        li.appendChild(span);
        presentList.appendChild(li);
      });
    }

    let selectedItems = [];

    // Marcar/desmarcar presente
    function toggleSelect(element, present) {
      if (element.classList.contains("selected")) {
        element.classList.remove("selected");
        selectedItems = selectedItems.filter(item => item !== present);
      } else {
        element.classList.add("selected");
        selectedItems.push(present);
      }
    }

    // Confirmar seleção de presentes
    async function confirmSelection() {
      const name = document.getElementById("guestName").value.trim();
      if (!name) return alert("Digite seu nome!");
      if (selectedItems.length === 0) return alert("Escolha pelo menos um presente!");

      const takenRef = doc(db, "takenPresents", "presentList");
      const docSnap = await getDoc(takenRef);
      const taken = docSnap.exists() ? docSnap.data() : {};

      selectedItems.forEach((item) => {
        taken[item] = name;
      });

      await setDoc(takenRef, taken);
      selectedItems = [];
      loadPresents(taken);
      document.getElementById("guestName").value = "";
      alert("Presentes confirmados! Obrigado 🥰");
    }

    // Exportar lista de presentes
    function exportarLista() {
      const takenRef = doc(db, "takenPresents", "presentList");
      getDoc(takenRef).then(docSnap => {
        const taken = docSnap.data() || {};
        if (Object.keys(taken).length === 0) {
          alert("Nenhum presente foi escolhido ainda.");
          return;
        }

        let texto = "🎁 Lista de Presentes Escolhidos:\n\n";
        for (const [item, nome] of Object.entries(taken)) {
          texto += `- ${item} → ${nome}\n`;
        }

        const blob = new Blob([texto], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "lista_cha_de_panela.txt";
        link.click();
        URL.revokeObjectURL(url);
      });
    }

    // Resetar lista (admin)
    function resetarLista() {
      const senha = prompt("Digite a senha para resetar:");
      if (senha === "admin123") {
        const takenRef = doc(db, "takenPresents", "presentList");
        setDoc(takenRef, {});
        alert("Lista resetada com sucesso!");
      } else {
        alert("Senha incorreta!");
      }
    }

    // Ouvir mudanças em tempo real
    onSnapshot(doc(db, "takenPresents", "presentList"), (docSnap) => {
      const taken = docSnap.data() || {};
      loadPresents(taken);
    });

    // Inicialização
    loadPresents({});
  </script>
</body>

</html>
