<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de Chá de Panela</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #ffeef2;
      padding: 20px;
      text-align: center;
    }

    h1 {
      color: #d14f79;
    }

    input,
    button {
      padding: 10px;
      margin: 10px 5px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    .present-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
      padding: 0;
      max-width: 1000px;
      margin: 20px auto;
      list-style: none;
    }

    .present-item {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      background: white;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
      font-weight: bold;
      text-transform: uppercase;
    }

    .present-item:hover {
      background: #fce4ec;
    }

    .present-item.selected {
      background: #d14f79;
      color: white;
    }

    .present-item.taken {
      text-decoration: line-through;
      background: #ccc;
      color: #888;
      cursor: not-allowed;
    }

    @media (max-width: 768px) {
      .present-list {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 480px) {
      .present-list {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <h1>Lista de Chá de Panela</h1>

  <input type="text" id="guestName" placeholder="Digite seu nome">
  <br>
  <button onclick="confirmSelection()">Confirmar Presentes</button>
  <button onclick="exportarLista()">Exportar Lista</button>
  <button onclick="resetarLista()" style="background: red; color: white;">Resetar Lista (Admin)</button>

  <ul class="present-list" id="presentList"></ul>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyArPOq9puGaoJG2ikMtoK7tdqKs-_oSEhA",
      authDomain: "cha-de-panela-3f175.firebaseapp.com",
      projectId: "cha-de-panela-3f175",
      storageBucket: "cha-de-panela-3f175.appspot.com",
      messagingSenderId: "54919113387",
      appId: "1:54919113387:web:f203e9dd320a73a0a665ee",
      measurementId: "G-YK68T4LH19",
      databaseURL: "https://cha-de-panela-3f175-default-rtdb.firebaseio.com/"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const presents = [
      'liquidificador', 'sanduicheira', 'batedeira', 'chaleira eletrica', 'panela de pressão',
      'airfryer', 'panela eletrica de arroz', 'jogo de panela', 'jode de pano de prato 2x',
      'jogo de copo', 'jogo de copo', 'jogo de talher', 'jogo de prato', 'jogo de vasilhas',
      'jogo de vasilhas', 'jarra de vidro', 'garrafa termica de café', 'escorredor de louça',
      'jogo de xicara', 'jogo de travessa', 'foma de bolo', 'processador de alimento',
      'ralador', 'tabua de madeira', 'jogo de taça', 'jogo de toalha', 'jogo de toalha',
      'pote hermeticos', 'pote hermeticos', 'jogo de cama (queen)', 'jogo de cama (queen)',
      'tabua de passa roupa', 'varal de chão', 'cuscuzeira'
    ];

    let selectedItems = [];
    const presentList = document.getElementById("presentList");

    async function loadPresents() {
      presentList.innerHTML = "";
      const dbRef = ref(db);
      const snapshot = await get(child(dbRef, `takenPresents`));
      const taken = snapshot.exists() ? snapshot.val() : {};

      presents.forEach((present, index) => {
        const key = `${present}_${index}`;
        const li = document.createElement("li");
        li.classList.add("present-item");
        li.textContent = present.toUpperCase();

        if (taken[key]) {
          li.classList.add("taken");
          li.title = `Escolhido por: ${taken[key]}`;
        } else {
          li.addEventListener("click", () => toggleSelect(li, key, present));
        }

        presentList.appendChild(li);
      });
    }

    function toggleSelect(element, key, label) {
      if (element.classList.contains("selected")) {
        element.classList.remove("selected");
        selectedItems = selectedItems.filter(i => i.key !== key);
      } else {
        element.classList.add("selected");
        selectedItems.push({ key, label });
      }
    }

    async function confirmSelection() {
      const name = document.getElementById("guestName").value.trim();
      if (!name) return alert("Digite seu nome!");
      if (selectedItems.length === 0) return alert("Escolha pelo menos um presente!");

      const updates = {};
      selectedItems.forEach(({ key }) => {
        updates[key] = name;
      });

      await set(ref(db, "takenPresents"), {
        ...(await (await get(ref(db, "takenPresents"))).val() || {}),
        ...updates
      });

      selectedItems = [];
      loadPresents();
      document.getElementById("guestName").value = "";
      alert("Presentes confirmados! Obrigado 🥰");
    }

    async function exportarLista() {
      const snapshot = await get(ref(db, "takenPresents"));
      const taken = snapshot.exists() ? snapshot.val() : {};
      if (Object.keys(taken).length === 0) {
        alert("Nenhum presente foi escolhido ainda.");
        return;
      }

      let texto = "🎁 Lista de Presentes Escolhidos:\n\n";
      for (const [key, nome] of Object.entries(taken)) {
        const item = key.replace(/_\d+$/, '');
        texto += `- ${item.toUpperCase()} → ${nome}\n`;
      }

      const blob = new Blob([texto], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);

      const link = document.createElement("a");
      link.href = url;
      link.download = "lista_cha_de_panela.txt";
      link.click();
      URL.revokeObjectURL(url);
    }

    async function resetarLista() {
      const senha = prompt("Digite a senha para resetar:");
      if (senha === "admin123") {
        await set(ref(db, "takenPresents"), {});
        loadPresents();
        alert("Lista resetada com sucesso!");
      } else {
        alert("Senha incorreta!");
      }
    }

    loadPresents();
  </script>
</body>

</html>
